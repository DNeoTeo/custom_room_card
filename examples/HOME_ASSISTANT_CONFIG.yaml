# Home Assistant Configuration Example
# Placement pour ui-lovelace.yaml ou dashboard UI

# Configuration Type A: Dashboard Simple (YAML)
# Copiez-collez ceci dans votre configuration

views:
  - title: Pièces
    icon: mdi:home
    cards:
      # Exemple 1: Salon
      - type: custom:custom-room-card
        title: "Salon"
        background_color: "#f5f5f5"
        height: "350px"
        entities:
          - entity: light.salon_main
            label: "Lumière"
            icon: mdi:lightbulb
            top: "30%"
            left: "30%"
            size: "70px"
            tap_action:
              action: toggle
              
          - entity: climate.salon
            label: "Température"
            icon: mdi:thermometer
            top: "30%"
            right: "30%"
            size: "70px"

      # Exemple 2: Chambre avec image
      - type: custom:custom-room-card
        title: "Chambre"
        background_image: /local/images/bedroom.jpg
        background_size: cover
        background_opacity: 0.8
        height: "400px"
        entities:
          - entity: light.bedroom_main
            label: "Plafond"
            icon: mdi:ceiling-light
            top: "25%"
            left: "50%"
            size: "70px"
            
          - entity: light.bedroom_reading_left
            label: "Gauche"
            icon: mdi:wall-sconce
            bottom: "20%"
            left: "20%"
            
          - entity: light.bedroom_reading_right
            label: "Droite"
            icon: mdi:wall-sconce
            bottom: "20%"
            right: "20%"

# Configuration Type B: Grille pour Développement
# Utilisez ceci pour positionner précisément vos entités

views:
  - title: Développement
    icon: mdi:tools
    cards:
      - type: custom:custom-room-card
        title: "Grille de Positionnement"
        show_grid: true
        grid_size: 50
        background_color: "rgba(200, 200, 200, 0.15)"
        height: "500px"
        entities:
          - entity: light.test_entity
            label: "Positionnez-moi"
            top: "50%"
            left: "50%"

# Configuration Type C: Automations & Scènes
# Utilisez avec les actions avancées

views:
  - title: Contrôles
    icon: mdi:remote
    cards:
      - type: custom:custom-room-card
        title: "Scènes"
        background_color: "#2c3e50"
        height: "350px"
        entities:
          # Scène: Cinéma
          - entity: scene.cinema
            label: "Cinéma"
            icon: mdi:filmstrip
            top: "50%"
            left: "25%"
            size: "80px"
            tap_action:
              action: call_service
              service: scene.turn_on
              data:
                entity_id: scene.cinema
                
          # Scène: Sommeil
          - entity: automation.goodnight
            label: "Bonne Nuit"
            icon: mdi:bed
            top: "50%"
            left: "50%"
            size: "80px"
            tap_action:
              action: call_service
              service: scene.turn_on
              data:
                entity_id: scene.sleep
                
          # Scène: Matin
          - entity: automation.morning
            label: "Matin"
            icon: mdi:weather-sunny
            top: "50%"
            right: "25%"
            size: "80px"
            tap_action:
              action: call_service
              service: scene.turn_on
              data:
                entity_id: scene.morning
