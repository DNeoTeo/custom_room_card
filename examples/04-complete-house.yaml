# Exemple 4: Maison Complète
# Représentation d'étages avec plusieurs pièces

# ÉTAGE 1: Salon
type: custom:custom-room-card
title: "🏠 Salon (Rez-de-Chaussée)"
background_image: /local/images/salon.jpg
background_size: cover
background_opacity: 0.8
height: "400px"
entities:
  - entity: light.salon_plafond
    label: "Plafond"
    icon: mdi:ceiling-light
    top: "20%"
    left: "50%"
    size: "70px"
    
  - entity: light.salon_table
    label: "Table"
    icon: mdi:table-lamp
    top: "50%"
    left: "30%"
    size: "60px"
    
  - entity: switch.salon_tv
    label: "TV"
    icon: mdi:television
    top: "50%"
    right: "20%"
    size: "70px"
    
  - entity: climate.salon
    label: "Clima"
    icon: mdi:air-conditioner
    bottom: "15%"
    left: "15%"
    size: "60px"
    
  - entity: sensor.salon_luminosite
    label: "Luminosité"
    icon: mdi:brightness-6
    bottom: "15%"
    right: "15%"
    size: "60px"

---

# ÉTAGE 2: Cuisine
type: custom:custom-room-card
title: "🍳 Cuisine (Rez-de-Chaussée)"
background_color: "#fffaf0"
height: "350px"
entities:
  - entity: light.kitchen_plafond
    label: "Plafond"
    icon: mdi:ceiling-light
    top: "25%"
    left: "50%"
    size: "70px"
    
  - entity: light.kitchen_comptoir
    label: "Comptoir"
    icon: mdi:counter
    bottom: "25%"
    left: "25%"
    size: "60px"
    
  - entity: switch.kitchen_hotte
    label: "Hotte"
    icon: mdi:air-filter
    bottom: "25%"
    right: "25%"
    size: "70px"

---

# ÉTAGE 3: Chambre
type: custom:custom-room-card
title: "🛏️ Chambre (Étage)"
background_image: /local/images/chambre.jpg
background_size: cover
background_opacity: 0.75
height: "400px"
entities:
  - entity: light.bedroom_main
    label: "Principal"
    icon: mdi:ceiling-light
    top: "25%"
    left: "50%"
    size: "70px"
    
  - entity: light.bedroom_reading_left
    label: "Lecture G"
    icon: mdi:wall-sconce
    bottom: "25%"
    left: "20%"
    size: "60px"
    
  - entity: light.bedroom_reading_right
    label: "Lecture D"
    icon: mdi:wall-sconce
    bottom: "25%"
    right: "20%"
    size: "60px"
    
  - entity: climate.bedroom
    label: "Thermo"
    icon: mdi:thermometer
    top: "70%"
    right: "15%"
    size: "60px"
