# Exemple 1: Configuration Simple
# Une pièce avec une lumière et un thermostat

type: custom:custom-room-card
title: "Salon Simple"
background_color: "#f5f5f5"
height: "300px"
border_radius: "8px"
entities:
  - entity: light.salon
    label: "Lumière"
    icon: mdi:lightbulb
    top: "30%"
    left: "25%"
    size: "60px"
    tap_action:
      action: toggle
      
  - entity: climate.salon
    label: "Thermo"
    icon: mdi:thermometer
    top: "30%"
    right: "25%"
    size: "60px"
    tap_action:
      action: call_service
      service: climate.set_temperature
      data:
        entity_id: climate.salon
        temperature: 21
